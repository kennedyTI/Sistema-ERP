upstream sistema_erp_frontend {
    server frontend:5173;
}

upstream sistema_erp_api {
    server api:8000;
}

upstream sistema_erp_admin {
    server admin:8001;
}

server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_SERVER_NAME};

    return 301 https://$host:${NGINX_HTTPS_PORT}$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${NGINX_SERVER_NAME};

    ssl_certificate ${SSL_CERT_PATH};
    ssl_certificate_key ${SSL_KEY_PATH};
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port ${NGINX_HTTPS_PORT};
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /api/ {
        proxy_pass http://sistema_erp_api;
    }

    location /admin/ {
        proxy_pass http://sistema_erp_admin;
    }

    location /static/admin/ {
        proxy_pass http://sistema_erp_admin;
    }

    location /media/ {
        proxy_pass http://sistema_erp_admin;
    }

    location /static/ {
        proxy_pass http://sistema_erp_frontend;
    }

    location / {
        proxy_pass http://sistema_erp_frontend;
    }
}
